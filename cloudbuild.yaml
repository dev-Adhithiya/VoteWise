steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE_NAME:$BUILD_ID', '.']

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE_NAME:$BUILD_ID']

  # 3. Deploy to Cloud Run with environment variables
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE_NAME:$BUILD_ID'
      - '--region'
      - '$_LOCATION'
      - '--allow-unauthenticated'
      - '--set-env-vars=GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},GOOGLE_CLIENT_SECRET=${_GOOGLE_CLIENT_SECRET},NEXTAUTH_SECRET=${_NEXTAUTH_SECRET},GEMINI_API_KEY=${_GEMINI_API_KEY},GOOGLE_CIVIC_API_KEY=${_GOOGLE_CIVIC_API_KEY},GOOGLE_FACTCHECK_API_KEY=${_GOOGLE_FACTCHECK_API_KEY},GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_API_KEY},YOUTUBE_API_KEY=${_YOUTUBE_API_KEY},NEXT_PUBLIC_GOOGLE_MAPS_KEY=${_NEXT_PUBLIC_GOOGLE_MAPS_KEY},NEXTAUTH_URL=${_NEXTAUTH_URL},AUTH_URL=${_AUTH_URL},AUTH_TRUST_HOST=true,GEMINI_MODEL=${_GEMINI_MODEL}'

images:
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE_NAME:$BUILD_ID'

substitutions:
  _LOCATION: us-central1
  _REPOSITORY: votewise-repo
  _IMAGE_NAME: votewise-app
  _SERVICE_NAME: votewise-service
  _GOOGLE_CLIENT_ID: ''
  _GOOGLE_CLIENT_SECRET: ''
  _NEXTAUTH_SECRET: ''
  _GEMINI_API_KEY: 'AIzaSyDOQlRK_pslelnla5G7PDpK_kGU2EBhpX8'
  _GOOGLE_CIVIC_API_KEY: ''
  _GOOGLE_FACTCHECK_API_KEY: ''
  _GOOGLE_MAPS_API_KEY: ''
  _YOUTUBE_API_KEY: ''
  _NEXT_PUBLIC_GOOGLE_MAPS_KEY: ''
  _NEXTAUTH_URL: 'https://votewise-service-REPLACE_WITH_PROJECT_NUMBER.us-central1.run.app'
  _AUTH_URL: 'https://votewise-service-REPLACE_WITH_PROJECT_NUMBER.us-central1.run.app'
  _GEMINI_MODEL: 'gemini-3.1-flash-lite-preview'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'N1_HIGHCPU_8'

